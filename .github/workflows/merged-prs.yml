name: Update Merged PRs

on:
  schedule:
    - cron: '0 0 * * SAT'  # runs every Monday at 00:00 UTC
  workflow_dispatch:       # allows manual run

jobs:
  update-merged-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate merged PRs list
        uses: peter-evans/github-merged-pull-requests@v1
        with:
          author: kareemalaa1       # your GitHub username
          state: merged
          sort: created
          limit: 10                # number of PRs to show
          output-file: merged-prs.md

      - name: Commit PR list
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add merged-prs.md
          git commit -m "Update merged PR list" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
